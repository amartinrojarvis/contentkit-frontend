<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContentKit Alpha — Tu agencia de contenido</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366F1',
                        secondary: '#F59E0B',
                        accent: '#10B981',
                        surface: '#FFFFFF',
                        background: '#FAFAFA',
                        text: '#1F2937',
                        muted: '#6B7280'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Inter', system-ui, sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .gradient-text {
            background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 50%, #EC4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
        }
        .loading {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body class="bg-background text-text min-h-screen">
    
    <!-- Navigation -->
    <nav class="fixed top-0 w-full bg-surface/90 backdrop-blur-md border-b border-gray-100 z-50">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-2">
                    <div class="w-9 h-9 rounded-xl gradient-bg flex items-center justify-center">
                        <i class="fas fa-wand-magic-sparkles text-white text-sm"></i>
                    </div>
                    <span class="font-bold text-xl">ContentKit</span>
                    <span id="demo-badge" class="hidden px-2 py-0.5 bg-accent/10 text-accent text-xs font-semibold rounded-full">DEMO</span>
                </div>
                <div class="hidden md:flex items-center gap-8" id="nav-links">
                    <span id="user-name" class="text-sm text-muted"></span>
                    <button onclick="logout()" id="logout-btn" class="hidden text-sm text-muted hover:text-text transition">Cerrar sesión</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-24 pb-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-4xl mx-auto" id="main-container">
            <!-- Content loaded dynamically -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-12 px-4 sm:px-6 lg:px-8 border-t border-gray-100">
        <div class="max-w-6xl mx-auto text-center text-sm text-muted">
            <p>ContentKit Alpha — Tu agencia de contenido, en una app</p>
        </div>
    </footer>

    <script>
        // Configuración API
        const API_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:5000' 
            : 'https://contentkit-backend.onrender.com';
        
        // Estado global
        let currentUser = null;
        let selectedPlan = 'starter';

        // Verificar sesión al cargar
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            if (token) {
                fetchUser(token);
            } else {
                showLanding();
            }
        });

        // ===== VISTAS =====
        
        function showLanding() {
            document.getElementById('logout-btn').classList.add('hidden');
            document.getElementById('user-name').textContent = '';
            
            document.getElementById('main-container').innerHTML = `
                <div class="text-center mb-12 fade-in">
                    <div class="inline-flex items-center gap-2 px-4 py-2 bg-primary/5 rounded-full text-primary text-sm font-medium mb-6">
                        <i class="fas fa-sparkles"></i>
                        <span>🎉 Modo DEMO: 2 generaciones gratuitas</span>
                    </div>
                    <h1 class="text-4xl sm:text-5xl font-extrabold mb-6">
                        Tu agencia de contenido,<br>
                        <span class="gradient-text">en una app</span>
                    </h1>
                    <p class="text-lg text-muted max-w-2xl mx-auto mb-8">
                        Genera publicaciones profesionales con IA. Sin contratos, sin complejidad.
                    </p>
                    <button onclick="showSignup()" class="px-8 py-4 gradient-bg text-white rounded-2xl hover:opacity-90 transition font-semibold text-lg">
                        Empezar gratis →
                    </button>
                </div>

                <!-- Features -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                    <div class="bg-surface rounded-2xl p-6 text-center">
                        <div class="w-12 h-12 rounded-xl bg-primary/10 text-primary flex items-center justify-center text-2xl mx-auto mb-4">
                            <i class="fas fa-image"></i>
                        </div>
                        <h3 class="font-semibold mb-2">Imágenes con IA</h3>
                        <p class="text-sm text-muted">ChatGPT Image 1.5 para fotos profesionales</p>
                    </div>
                    <div class="bg-surface rounded-2xl p-6 text-center">
                        <div class="w-12 h-12 rounded-xl bg-secondary/10 text-secondary flex items-center justify-center text-2xl mx-auto mb-4">
                            <i class="fas fa-pen-fancy"></i>
                        </div>
                        <h3 class="font-semibold mb-2">Copy optimizado</h3>
                        <p class="text-sm text-muted">Textos que enganchan y convierten</p>
                    </div>
                    <div class="bg-surface rounded-2xl p-6 text-center">
                        <div class="w-12 h-12 rounded-xl bg-accent/10 text-accent flex items-center justify-center text-2xl mx-auto mb-4">
                            <i class="fas fa-bolt"></i>
                        </div>
                        <h3 class="font-semibold mb-2">En minutos</h3>
                        <p class="text-sm text-muted">De idea a publicación lista</p>
                    </div>
                </div>
            `;
        }

        function showSignup() {
            document.getElementById('main-container').innerHTML = `
                <div class="max-w-md mx-auto fade-in">
                    <div class="bg-surface rounded-3xl p-8 shadow-lg">
                        <h2 class="text-2xl font-bold mb-6 text-center">Crear cuenta gratis</h2>
                        <p class="text-sm text-muted text-center mb-6">Modo DEMO: 2 generaciones gratuitas, sin tarjeta</p>
                        
                        <form id="signup-form" class="space-y-4" onsubmit="handleSignup(event)">
                            <div>
                                <label class="block text-sm font-medium mb-1">Email</label>
                                <input type="email" name="email" class="w-full p-3 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none" placeholder="tu@email.com" required>
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium mb-1">Contraseña</label>
                                <input type="password" name="password" class="w-full p-3 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none" placeholder="••••••••" required minlength="6">
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium mb-1">Nombre de marca/cuenta</label>
                                <input type="text" name="brand_name" class="w-full p-3 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none" placeholder="@micuenta" required>
                            </div>
                            
                            <button type="submit" id="signup-btn" class="w-full py-3 gradient-bg text-white rounded-xl hover:opacity-90 transition font-semibold">
                                Crear cuenta gratis
                            </button>
                        </form>
                        
                        <p class="text-center text-sm text-muted mt-4">
                            ¿Ya tienes cuenta? <button onclick="showLogin()" class="text-primary hover:underline">Inicia sesión</button>
                        </p>
                        
                        <div id="signup-error" class="hidden mt-4 p-3 bg-red-50 text-red-600 rounded-xl text-sm"></div>
                    </div>
                </div>
            `;
        }

        function showLogin() {
            document.getElementById('main-container').innerHTML = `
                <div class="max-w-md mx-auto fade-in">
                    <div class="bg-surface rounded-3xl p-8 shadow-lg">
                        <h2 class="text-2xl font-bold mb-6 text-center">Iniciar sesión</h2>
                        
                        <form id="login-form" class="space-y-4" onsubmit="handleLogin(event)">
                            <div>
                                <label class="block text-sm font-medium mb-1">Email</label>
                                <input type="email" name="email" class="w-full p-3 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none" placeholder="tu@email.com" required>
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium mb-1">Contraseña</label>
                                <input type="password" name="password" class="w-full p-3 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none" placeholder="••••••••" required>
                            </div>
                            
                            <button type="submit" id="login-btn" class="w-full py-3 gradient-bg text-white rounded-xl hover:opacity-90 transition font-semibold">
                                Entrar
                            </button>
                        </form>
                        
                        <p class="text-center text-sm text-muted mt-4">
                            ¿No tienes cuenta? <button onclick="showSignup()" class="text-primary hover:underline">Crear cuenta</button>
                        </p>
                        
                        <div id="login-error" class="hidden mt-4 p-3 bg-red-50 text-red-600 rounded-xl text-sm"></div>
                    </div>
                </div>
            `;
        }

        function showDashboard(user) {
            currentUser = user;
            document.getElementById('demo-badge').classList.remove('hidden');
            document.getElementById('logout-btn').classList.remove('hidden');
            document.getElementById('user-name').textContent = user.name;
            
            const postsRemaining = user.posts_allowed - user.posts_used_this_period;
            
            document.getElementById('main-container').innerHTML = `
                <div class="fade-in">
                    <div class="bg-gradient-to-r from-primary to-purple-500 rounded-2xl p-6 text-white mb-8">
                        <h2 class="text-2xl font-bold mb-2">¡Hola, ${user.name}!</h2>
                        <p class="opacity-90">Tienes <strong>${postsRemaining}</strong> generaciones disponibles</p>
                        ${user.demo_mode ? '<p class="text-xs opacity-75 mt-1">Modo DEMO: 2 generaciones gratuitas</p>' : ''}
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <button onclick="showCreatePost()" class="bg-surface rounded-2xl p-6 text-left hover:shadow-lg transition border-2 border-transparent hover:border-primary">
                            <div class="w-12 h-12 rounded-xl bg-primary/10 text-primary flex items-center justify-center text-2xl mb-4">
                                <i class="fas fa-plus"></i>
                            </div>
                            <h3 class="font-semibold text-lg mb-1">Nueva publicación</h3>
                            <p class="text-sm text-muted">Generar contenido con IA</p>
                        </button>
                        
                        <button onclick="showMyPosts()" class="bg-surface rounded-2xl p-6 text-left hover:shadow-lg transition border-2 border-transparent hover:border-primary">
                            <div class="w-12 h-12 rounded-xl bg-secondary/10 text-secondary flex items-center justify-center text-2xl mb-4">
                                <i class="fas fa-images"></i>
                            </div>
                            <h3 class="font-semibold text-lg mb-1">Mis publicaciones</h3>
                            <p class="text-sm text-muted">Ver historial y descargar</p>
                        </button>
                    </div>
                </div>
            `;
        }

        // ===== FUNCIONES API =====
        
        async function handleSignup(e) {
            e.preventDefault();
            const btn = document.getElementById('signup-btn');
            const errorDiv = document.getElementById('signup-error');
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creando...';
            btn.disabled = true;
            
            const formData = new FormData(e.target);
            const data = {
                email: formData.get('email'),
                password: formData.get('password'),
                name: formData.get('email').split('@')[0],
                brand_name: formData.get('brand_name'),
                plan_id: 'starter'
            };
            
            try {
                const response = await fetch(`${API_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', result.token);
                    showDashboard(result.user);
                } else {
                    errorDiv.textContent = result.error || 'Error al crear cuenta';
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                errorDiv.textContent = 'Error de conexión. Intenta de nuevo.';
                errorDiv.classList.remove('hidden');
            } finally {
                btn.innerHTML = 'Crear cuenta gratis';
                btn.disabled = false;
            }
        }
        
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const errorDiv = document.getElementById('login-error');
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Entrando...';
            btn.disabled = true;
            
            const formData = new FormData(e.target);
            const data = {
                email: formData.get('email'),
                password: formData.get('password')
            };
            
            try {
                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', result.token);
                    showDashboard(result.user);
                } else {
                    errorDiv.textContent = result.error || 'Credenciales incorrectas';
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                errorDiv.textContent = 'Error de conexión. Intenta de nuevo.';
                errorDiv.classList.remove('hidden');
            } finally {
                btn.innerHTML = 'Entrar';
                btn.disabled = false;
            }
        }
        
        async function fetchUser(token) {
            try {
                const response = await fetch(`${API_URL}/api/user/profile`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    const result = await response.json();
                    showDashboard(result.user);
                } else {
                    localStorage.removeItem('token');
                    showLanding();
                }
            } catch (err) {
                localStorage.removeItem('token');
                showLanding();
            }
        }
        
        function logout() {
            localStorage.removeItem('token');
            currentUser = null;
            showLanding();
        }
        
        function showCreatePost() {
            document.getElementById('main-container').innerHTML = `
                <div class="fade-in">
                    <button onclick="showDashboard(currentUser)" class="text-muted hover:text-text mb-4">← Volver</button>
                    
                    <h2 class="text-2xl font-bold mb-6">Nueva publicación</h2>
                    
                    <form id="create-form" class="space-y-6" onsubmit="handleCreatePost(event)">
                        <div>
                            <label class="block text-sm font-medium mb-2">¿Sobre qué tema?</label>
                            <textarea name="brief" class="w-full p-4 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none resize-none" rows="4" placeholder="Ej: Un post sobre cómo empezar en fotografía de retrato..." required></textarea>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium mb-2">Plataforma</label>
                            <select name="platform" class="w-full p-3 rounded-xl border border-gray-200 focus:border-primary outline-none">
                                <option value="instagram">Instagram</option>
                                <option value="tiktok">TikTok</option>
                                <option value="linkedin">LinkedIn</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium mb-2">Formato</label>
                            <select name="format" class="w-full p-3 rounded-xl border border-gray-200 focus:border-primary outline-none">
                                <option value="square">Cuadrado (1:1)</option>
                                <option value="vertical">Vertical (4:5)</option>
                                <option value="story">Story (9:16)</option>
                            </select>
                        </div>
                        
                        <button type="submit" id="create-btn" class="w-full py-4 gradient-bg text-white rounded-xl hover:opacity-90 transition font-semibold">
                            ✨ Generar publicación
                        </button>
                    </form>
                    
                    <div id="create-error" class="hidden mt-4 p-3 bg-red-50 text-red-600 rounded-xl text-sm"></div>
                </div>
            `;
        }
        
        async function handleCreatePost(e) {
            e.preventDefault();
            const btn = document.getElementById('create-btn');
            const errorDiv = document.getElementById('create-error');
            const token = localStorage.getItem('token');
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generando...';
            btn.disabled = true;
            
            const formData = new FormData(e.target);
            const data = {
                type: 'product',
                brief: formData.get('brief'),
                platform: formData.get('platform'),
                format: formData.get('format'),
                tone: 'professional'
            };
            
            try {
                const response = await fetch(`${API_URL}/api/posts/generate`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    showPostResult(result.post);
                } else {
                    errorDiv.textContent = result.error || 'Error al generar';
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                errorDiv.textContent = 'Error de conexión. Intenta de nuevo.';
                errorDiv.classList.remove('hidden');
            } finally {
                btn.innerHTML = '✨ Generar publicación';
                btn.disabled = false;
            }
        }
        
        function showPostResult(post) {
            document.getElementById('main-container').innerHTML = `
                <div class="fade-in">
                    <button onclick="showDashboard(currentUser)" class="text-muted hover:text-text mb-4">← Volver al dashboard</button>
                    
                    <div class="bg-surface rounded-2xl shadow-lg overflow-hidden">
                        <div class="p-6 border-b border-gray-100">
                            <h2 class="text-xl font-bold mb-2">✨ Publicación lista</h2>
                            <p class="text-sm text-muted">Generado el ${new Date(post.created_at).toLocaleDateString()}</p>
                        </div>
                        
                        <div class="p-6">
                            <div class="bg-gradient-to-br from-purple-100 to-pink-100 rounded-xl p-8 mb-6 flex items-center justify-center">
                                <div class="bg-white rounded-xl shadow p-6 max-w-xs">
                                    <div class="aspect-square bg-gradient-to-br from-purple-200 to-pink-200 rounded-lg mb-4 flex items-center justify-center">
                                        <i class="fas fa-image text-4xl text-purple-400"></i>
                                    </div>
                                    <p class="text-xs text-gray-400">Imagen generada por IA</p>
                                </div>
                            </div>
                            
                            <div class="mb-6">
                                <h3 class="text-sm font-semibold text-primary uppercase tracking-wide mb-2">Copy sugerido</h3>
                                <div class="bg-gray-50 rounded-xl p-4 whitespace-pre-wrap">${post.generated_copy || 'Copy generado por IA...'}</div>
                            </div>
                            
                            <div class="mb-6">
                                <h3 class="text-sm font-semibold text-primary uppercase tracking-wide mb-2">Hashtags</h3>
                                <p class="text-primary">${post.generated_hashtags ? post.generated_hashtags.join(' ') : '#content #marketing'}</p>
                            </div>
                            
                            <div class="flex gap-3">
                                <button onclick="showDashboard(currentUser)" class="flex-1 py-3 bg-gray-100 text-text rounded-xl hover:bg-gray-200 transition font-medium">
                                    Crear otra
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        async function showMyPosts() {
            const token = localStorage.getItem('token');
            
            try {
                const response = await fetch(`${API_URL}/api/posts/list`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const result = await response.json();
                
                let postsHtml = '';
                if (result.posts && result.posts.length > 0) {
                    postsHtml = result.posts.map(post => `
                        <div class="bg-surface rounded-2xl p-4 border border-gray-100">
                            <div class="flex items-center gap-4">
                                <div class="w-16 h-16 bg-gradient-to-br from-purple-200 to-pink-200 rounded-lg flex items-center justify-center">
                                    <i class="fas fa-image text-purple-400"></i>
                                </div>
                                <div class="flex-1">
                                    <p class="font-medium">${post.brief ? post.brief.substring(0, 50) + '...' : 'Publicación'}</p>
                                    <p class="text-sm text-muted">${new Date(post.created_at).toLocaleDateString()}</p>
                                </div>
                                <span class="px-2 py-1 bg-primary/10 text-primary text-xs rounded-full">${post.status}</span>
                            </div>
                        </div>
                    `).join('');
                } else {
                    postsHtml = '<p class="text-center text-muted py-8">No tienes publicaciones aún</p>';
                }
                
                document.getElementById('main-container').innerHTML = `
                    <div class="fade-in">
                        <button onclick="showDashboard(currentUser)" class="text-muted hover:text-text mb-4">← Volver</button>
                        <h2 class="text-2xl font-bold mb-6">Mis publicaciones</h2>
                        <div class="space-y-4">${postsHtml}</div>
                    </div>
                `;
            } catch (err) {
                document.getElementById('main-container').innerHTML = `
                    <div class="fade-in">
                        <button onclick="showDashboard(currentUser)" class="text-muted hover:text-text mb-4">← Volver</button>
                        <h2 class="text-2xl font-bold mb-6">Mis publicaciones</h2>
                        <p class="text-center text-muted">Error al cargar publicaciones</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
