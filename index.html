<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContentKit Alpha — Tu agencia de contenido, en una app</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366F1',
                        secondary: '#F59E0B',
                        accent: '#10B981',
                        surface: '#FFFFFF',
                        background: '#FAFAFA',
                        text: '#1F2937',
                        muted: '#6B7280'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Inter', system-ui, sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .gradient-text {
            background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 50%, #EC4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
        }
    </style>
</head>
<body class="bg-background text-text min-h-screen">
    
    <!-- Navigation -->
    <nav class="fixed top-0 w-full bg-surface/90 backdrop-blur-md border-b border-gray-100 z-50">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="/" class="flex items-center gap-2">
                    <div class="w-9 h-9 rounded-xl gradient-bg flex items-center justify-center">
                        <i class="fas fa-wand-magic-sparkles text-white text-sm"></i>
                    </div>
                    <span class="font-bold text-xl">ContentKit</span>
                    <span id="demo-badge" class="hidden px-2 py-0.5 bg-accent/10 text-accent text-xs font-semibold rounded-full ml-2">DEMO</span>
                </a>
                <div class="flex items-center gap-3" id="nav-buttons">
                    <button onclick="showLogin()" class="px-4 py-2 text-muted hover:text-text transition">Iniciar sesión</button>
                    <button onclick="showSignup()" class="px-5 py-2 gradient-bg text-white rounded-xl hover:opacity-90 transition font-medium">Crear cuenta</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="pt-32 pb-20 px-4 sm:px-6 lg:px-8">
        <div class="max-w-5xl mx-auto text-center">
            <div id="hero-badge" class="inline-flex items-center gap-2 px-4 py-2 bg-primary/5 rounded-full text-primary text-sm font-medium mb-6">
                <i class="fas fa-sparkles"></i>
                <span>🎉 Modo DEMO: Prueba sin límites</span>
            </div>
            
            <h1 class="text-4xl sm:text-5xl lg:text-6xl font-extrabold mb-6 leading-tight">
                Tu agencia de contenido,
                <br>
                <span class="gradient-text">en una app</span>
            </h1>
            
            <p class="text-lg sm:text-xl text-muted max-w-2xl mx-auto mb-8 leading-relaxed">
                Genera publicaciones profesionales con IA. Prueba gratis sin tarjeta, sin compromiso.
            </p>
            
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <button onclick="showSignup()" class="px-8 py-4 gradient-bg text-white rounded-2xl hover:opacity-90 transition font-semibold text-lg">
                    Empezar gratis →
                </button>
            </div>
            
            <div class="flex flex-wrap justify-center gap-8 text-sm text-muted mt-8">
                <span class="flex items-center gap-2"><i class="fas fa-check-circle text-accent"></i> Imágenes con ChatGPT</span>
                <span class="flex items-center gap-2"><i class="fas fa-check-circle text-accent"></i> Copy optimizado</span>
                <span class="flex items-center gap-2"><i class="fas fa-check-circle text-accent"></i> Sin tarjeta</span>
            </div>
        </div>
    </section>

    <!-- Login/Signup Modal -->
    <div id="auth-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="bg-surface rounded-3xl p-8 max-w-md w-full shadow-2xl relative">
            <button onclick="hideAuthModal()" class="absolute top-4 right-4 text-muted hover:text-text">
                <i class="fas fa-times text-xl"></i>
            </button>
            
            <div id="auth-form-container">
                <!-- Form loaded dynamically -->
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="py-12 px-4 sm:px-6 lg:px-8 border-t border-gray-100">
        <div class="max-w-6xl mx-auto text-center text-sm text-muted">
            <p>ContentKit Alpha — Tu agencia de contenido, en una app</p>
        </div>
    </footer>

    <script>
        const API_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:5000' 
            : 'https://contentkit-backend.onrender.com';

        // Check demo mode
        async function checkDemoMode() {
            try {
                const response = await fetch(`${API_URL}/api/plans`);
                const data = await response.json();
                if (data.demo_mode) {
                    document.getElementById('demo-badge').classList.remove('hidden');
                }
            } catch (e) {
                console.log('API no disponible');
            }
        }
        checkDemoMode();

        function showLogin() {
            document.getElementById('auth-modal').classList.remove('hidden');
            document.getElementById('auth-modal').classList.add('flex');
            document.getElementById('auth-form-container').innerHTML = `
                <h2 class="text-2xl font-bold mb-2">Iniciar sesión</h2>
                <p class="text-muted text-sm mb-6">Accede a tu cuenta</p>
                
                <form onsubmit="handleLogin(event)" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Email</label>
                        <input type="email" name="email" class="w-full p-3 rounded-xl border border-gray-200 focus:border-primary outline-none" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Contraseña</label>
                        <input type="password" name="password" class="w-full p-3 rounded-xl border border-gray-200 focus:border-primary outline-none" required>
                    </div>
                    <button type="submit" id="login-btn" class="w-full py-3 gradient-bg text-white rounded-xl hover:opacity-90 transition font-semibold">
                        Entrar
                    </button>
                </form>
                
                <p class="text-center text-sm text-muted mt-4">
                    ¿No tienes cuenta? <button onclick="showSignup()" class="text-primary hover:underline">Crear cuenta</button>
                </p>
                <div id="login-error" class="hidden mt-4 p-3 bg-red-50 text-red-600 rounded-xl text-sm"></div>
            `;
        }

        function showSignup() {
            document.getElementById('auth-modal').classList.remove('hidden');
            document.getElementById('auth-modal').classList.add('flex');
            document.getElementById('auth-form-container').innerHTML = `
                <h2 class="text-2xl font-bold mb-2">Crear cuenta</h2>
                <p class="text-muted text-sm mb-6">Modo DEMO: Sin límite de generaciones</p>
                
                <form onsubmit="handleSignup(event)" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Email</label>
                        <input type="email" name="email" class="w-full p-3 rounded-xl border border-gray-200 focus:border-primary outline-none" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Contraseña</label>
                        <input type="password" name="password" class="w-full p-3 rounded-xl border border-gray-200 focus:border-primary outline-none" required minlength="6">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Marca/Cuenta</label>
                        <input type="text" name="brand_name" class="w-full p-3 rounded-xl border border-gray-200 focus:border-primary outline-none" placeholder="@mimarca" required>
                    </div>
                    <button type="submit" id="signup-btn" class="w-full py-3 gradient-bg text-white rounded-xl hover:opacity-90 transition font-semibold">
                        Crear cuenta gratis
                    </button>
                </form>
                
                <p class="text-center text-sm text-muted mt-4">
                    ¿Ya tienes cuenta? <button onclick="showLogin()" class="text-primary hover:underline">Iniciar sesión</button>
                </p>
                <div id="signup-error" class="hidden mt-4 p-3 bg-red-50 text-red-600 rounded-xl text-sm"></div>
            `;
        }

        function hideAuthModal() {
            document.getElementById('auth-modal').classList.add('hidden');
            document.getElementById('auth-modal').classList.remove('flex');
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const errorDiv = document.getElementById('login-error');
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Entrando...';
            btn.disabled = true;
            
            const formData = new FormData(e.target);
            
            try {
                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: formData.get('email'),
                        password: formData.get('password')
                    })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', result.token);
                    window.location.href = '/dashboard.html';
                } else {
                    errorDiv.textContent = result.error || 'Credenciales incorrectas';
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                errorDiv.textContent = 'Error de conexión';
                errorDiv.classList.remove('hidden');
            } finally {
                btn.innerHTML = 'Entrar';
                btn.disabled = false;
            }
        }

        async function handleSignup(e) {
            e.preventDefault();
            const btn = document.getElementById('signup-btn');
            const errorDiv = document.getElementById('signup-error');
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creando...';
            btn.disabled = true;
            
            const formData = new FormData(e.target);
            
            try {
                const response = await fetch(`${API_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: formData.get('email'),
                        password: formData.get('password'),
                        name: formData.get('email').split('@')[0],
                        brand_name: formData.get('brand_name'),
                        plan_id: 'starter'
                    })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', result.token);
                    window.location.href = '/dashboard.html';
                } else {
                    errorDiv.textContent = result.error || 'Error al crear cuenta';
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                errorDiv.textContent = 'Error de conexión';
                errorDiv.classList.remove('hidden');
            } finally {
                btn.innerHTML = 'Crear cuenta gratis';
                btn.disabled = false;
            }
        }

        // Close modal on outside click
        document.getElementById('auth-modal').addEventListener('click', function(e) {
            if (e.target === this) hideAuthModal();
        });
    </script>
</body>
</html>
